spring:
  application:
    name: CPBattle

  datasource:
    url: ${POSTGRES_URI}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

jwtSecret: ${JWT_SECRET}
